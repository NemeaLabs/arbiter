name: 'Arbiter SAST Triage by NemeaLabs'
description: 'AI-powered SAST triage with reachability analysis. Pass any SARIF file, get true/false positive verdicts on every PR.'
author: 'NemeaLabs'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  mode:
    description: 'Run mode: pr or backlog'
    required: false
    default: 'pr'
  target:
    description: 'Path to scan (default: repo root)'
    required: false
    default: '.'
  github-token:
    description: 'GitHub token. PR mode needs pull-requests:write. Backlog mode needs security-events:read (add security-events:write to dismiss FPs).'
    required: true
  github-repo:
    description: 'Repository as owner/repo (defaults to current repo)'
    required: false
    default: ${{ github.repository }}

  # LLM provider
  anthropic-api-key:
    description: 'Anthropic API key'
    required: false
  triage-provider:
    description: 'LLM provider: anthropic (default), azure (Azure AI Foundry), azure-openai (Azure OpenAI Service), or openai (any OpenAI-compatible endpoint e.g. GitHub Models)'
    required: false
    default: 'anthropic'
  anthropic-model:
    description: 'Anthropic model override'
    required: false
  azure-ai-endpoint:
    description: 'Azure AI Foundry endpoint'
    required: false
  azure-ai-api-key:
    description: 'Azure AI API key'
    required: false
  azure-ai-model:
    description: 'Azure AI model/deployment name'
    required: false
  azure-ai-api-version:
    description: 'Azure AI API version'
    required: false

  # PR mode
  baseline:
    description: 'Base commit SHA to diff against (PR mode)'
    required: false
  scanners:
    description: 'Comma-separated scanner integrations: github-code-scanning (alias: codeql) — fetch alerts from GitHub Code Scanning API. Omit when passing sarif-file/sarif-dir.'
    required: false
    default: ''
  sarif-file:
    description: 'Path to a SARIF output file to triage (any SAST tool: Trivy, Bandit, Snyk, Checkov, gosec, ESLint, etc.)'
    required: false
  sarif-dir:
    description: 'Directory containing *.sarif files to triage'
    required: false
  github-ref:
    description: 'PR head ref for CodeQL alert lookup (e.g. refs/pull/N/head)'
    required: false
  fail-on:
    description: 'Exit nonzero to block the merge when: any-tp = any true positive found; high-tp = true positive with high/critical severity and confidence ≥ 0.8'
    required: false

  # Backlog mode
  skip-alerts:
    description: 'Comma-separated CodeQL alert numbers to skip (already triaged)'
    required: false
    default: ''
  dismiss-fps:
    description: 'Auto-dismiss AI-confirmed false positive alerts (requires security-events:write)'
    required: false
    default: 'false'

  # Shared
  out:
    description: 'Output report file prefix (produces <prefix>.md and <prefix>.json)'
    required: false
    default: 'arbiter-report'
  no-reachability:
    description: 'Skip the Phase 3 reachability analysis pass'
    required: false
    default: 'false'
  concurrency:
    description: 'Number of parallel LLM triage calls'
    required: false
    default: '4'

outputs:
  report-md:
    description: 'Path to the generated Markdown report'
    value: ${{ steps.run.outputs.report_md }}
  report-json:
    description: 'Path to the generated JSON report'
    value: ${{ steps.run.outputs.report_json }}
  exit-code:
    description: 'Arbiter exit code (0 = pass, 1 = fail-on gate triggered)'
    value: ${{ steps.run.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r "${{ github.action_path }}/triage-cli/requirements.txt"

    - name: Configure credentials
      shell: bash
      run: |
        # Resolve each credential from env: (set by caller on the uses: step)
        # or fall back to the with: input. Then write the final value to
        # GITHUB_ENV so it persists to the Run arbiter step. Without this,
        # env: values are only visible in the current step's shell context and
        # do not carry over to subsequent steps in the composite action.
        GT="${GITHUB_TOKEN:-${{ inputs.github-token }}}";           [[ -n "$GT"  ]] && echo "GITHUB_TOKEN=$GT"             >> "$GITHUB_ENV" || true
        TP="${TRIAGE_PROVIDER:-${{ inputs.triage-provider }}}";     [[ -n "$TP"  ]] && echo "TRIAGE_PROVIDER=$TP"          >> "$GITHUB_ENV" || true
        KEY="${ANTHROPIC_API_KEY:-${{ inputs.anthropic-api-key }}}"; [[ -n "$KEY" ]] && echo "ANTHROPIC_API_KEY=$KEY"       >> "$GITHUB_ENV" || true
        MOD="${ANTHROPIC_MODEL:-${{ inputs.anthropic-model }}}";     [[ -n "$MOD" ]] && echo "ANTHROPIC_MODEL=$MOD"         >> "$GITHUB_ENV" || true
        EP="${AZURE_AI_ENDPOINT:-${{ inputs.azure-ai-endpoint }}}";  [[ -n "$EP"  ]] && echo "AZURE_AI_ENDPOINT=$EP"        >> "$GITHUB_ENV" || true
        AK="${AZURE_AI_API_KEY:-${{ inputs.azure-ai-api-key }}}";    [[ -n "$AK"  ]] && echo "AZURE_AI_API_KEY=$AK"         >> "$GITHUB_ENV" || true
        AM="${AZURE_AI_MODEL:-${{ inputs.azure-ai-model }}}";        [[ -n "$AM"  ]] && echo "AZURE_AI_MODEL=$AM"           >> "$GITHUB_ENV" || true
        AV="${AZURE_AI_API_VERSION:-${{ inputs.azure-ai-api-version }}}"; [[ -n "$AV" ]] && echo "AZURE_AI_API_VERSION=$AV" >> "$GITHUB_ENV" || true

    - name: Run arbiter
      id: run
      shell: bash
      run: |
        set +e

        ARGS=("${{ inputs.target }}" "--out" "${{ inputs.out }}" "--concurrency" "${{ inputs.concurrency }}")

        if [[ "${{ inputs.mode }}" == "backlog" ]]; then
          ARGS+=("--backlog" "--github-repo" "${{ inputs.github-repo }}")
          [[ -n "${{ inputs.skip-alerts }}" ]]   && ARGS+=("--skip-alerts"   "${{ inputs.skip-alerts }}")
          [[ "${{ inputs.dismiss-fps }}" == "true" ]] && ARGS+=("--dismiss-fps")
        else
          [[ -n "${{ inputs.scanners }}"   ]] && ARGS+=("--scanners" "${{ inputs.scanners }}" "--github-repo" "${{ inputs.github-repo }}")
          [[ -n "${{ inputs.baseline }}"   ]] && ARGS+=("--baseline"    "${{ inputs.baseline }}")
          [[ -n "${{ inputs.github-ref }}" ]] && ARGS+=("--github-ref"  "${{ inputs.github-ref }}")
          [[ -n "${{ inputs.fail-on }}"    ]] && ARGS+=("--fail-on"     "${{ inputs.fail-on }}")
          [[ -n "${{ inputs.sarif-file }}" ]] && ARGS+=("--sarif"       "${{ inputs.sarif-file }}")
          [[ -n "${{ inputs.sarif-dir }}"  ]] && ARGS+=("--sarif-dir"   "${{ inputs.sarif-dir }}")
        fi

        [[ "${{ inputs.no-reachability }}" == "true" ]] && ARGS+=("--no-reachability")

        python "${{ github.action_path }}/triage-cli/triage.py" "${ARGS[@]}"
        EXIT_CODE=$?

        echo "exit_code=$EXIT_CODE"   >> "$GITHUB_OUTPUT"
        echo "report_md=${{ inputs.out }}.md"   >> "$GITHUB_OUTPUT"
        echo "report_json=${{ inputs.out }}.json" >> "$GITHUB_OUTPUT"

        exit $EXIT_CODE
