name: 'Arbiter'
description: 'AI-powered SAST finding triage with reachability analysis'
author: 'NemeaLabs'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  mode:
    description: 'Run mode: pr or backlog'
    required: false
    default: 'pr'
  target:
    description: 'Path to scan (default: repo root)'
    required: false
    default: '.'
  github-token:
    description: 'GitHub token. PR mode needs pull-requests:write. Backlog mode needs security-events:read (add security-events:write to dismiss FPs).'
    required: true
  github-repo:
    description: 'Repository as owner/repo (defaults to current repo)'
    required: false
    default: ${{ github.repository }}

  # LLM provider
  anthropic-api-key:
    description: 'Anthropic API key'
    required: false
  triage-provider:
    description: 'LLM provider: anthropic (default), azure (Azure AI Foundry), or azure-openai (Azure OpenAI Service)'
    required: false
    default: 'anthropic'
  anthropic-model:
    description: 'Anthropic model override'
    required: false
  azure-ai-endpoint:
    description: 'Azure AI Foundry endpoint'
    required: false
  azure-ai-api-key:
    description: 'Azure AI API key'
    required: false
  azure-ai-model:
    description: 'Azure AI model/deployment name'
    required: false
  azure-ai-api-version:
    description: 'Azure AI API version'
    required: false

  # PR mode
  baseline:
    description: 'Base commit SHA to diff against (PR mode)'
    required: false
  scanners:
    description: 'Comma-separated scanner integrations: github-code-scanning (alias: codeql) — fetch alerts from GitHub Code Scanning API. Omit when passing sarif-file/sarif-dir.'
    required: false
    default: ''
  sarif-file:
    description: 'Path to a SARIF output file to triage (any SAST tool: Trivy, Bandit, Snyk, Checkov, gosec, ESLint, etc.)'
    required: false
  sarif-dir:
    description: 'Directory containing *.sarif files to triage'
    required: false
  github-ref:
    description: 'PR head ref for CodeQL alert lookup (e.g. refs/pull/N/head)'
    required: false
  fail-on:
    description: 'Exit nonzero to block the merge when: any-tp = any true positive found; high-tp = true positive with high/critical severity and confidence ≥ 0.8'
    required: false

  # Backlog mode
  skip-alerts:
    description: 'Comma-separated CodeQL alert numbers to skip (already triaged)'
    required: false
    default: ''
  dismiss-fps:
    description: 'Auto-dismiss AI-confirmed false positive alerts (requires security-events:write)'
    required: false
    default: 'false'
  post-comments:
    description: 'Post a verdict comment directly on each GitHub Code Scanning alert (falls back to summary-issue if GHAS is not available)'
    required: false
    default: 'false'
  summary-issue:
    description: 'Summary issue number for per-alert comments (backlog mode)'
    required: false

  # Shared
  out:
    description: 'Output report file prefix (produces <prefix>.md and <prefix>.json)'
    required: false
    default: 'arbiter-report'
  no-reachability:
    description: 'Skip the Phase 3 reachability analysis pass'
    required: false
    default: 'false'
  concurrency:
    description: 'Number of parallel LLM triage calls'
    required: false
    default: '4'

outputs:
  report-md:
    description: 'Path to the generated Markdown report'
    value: ${{ steps.run.outputs.report_md }}
  report-json:
    description: 'Path to the generated JSON report'
    value: ${{ steps.run.outputs.report_json }}
  exit-code:
    description: 'Arbiter exit code (0 = pass, 1 = fail-on gate triggered)'
    value: ${{ steps.run.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r "${{ github.action_path }}/triage-cli/requirements.txt"

    - name: Configure credentials
      shell: bash
      run: |
        # Only write a value to GITHUB_ENV when the env var is not already
        # set by the calling workflow's step-level env: block. This lets
        # callers pass secrets via `env:` on the `uses:` step (the reliable
        # path) while inputs serve as a fallback for direct usage.
        [[ -z "$GITHUB_TOKEN" ]]         && echo "GITHUB_TOKEN=${{ inputs.github-token }}"             >> "$GITHUB_ENV" || true
        [[ -z "$TRIAGE_PROVIDER" ]]      && echo "TRIAGE_PROVIDER=${{ inputs.triage-provider }}"       >> "$GITHUB_ENV" || true
        KEY="${{ inputs.anthropic-api-key }}";   [[ -n "$KEY" && -z "$ANTHROPIC_API_KEY" ]]   && echo "ANTHROPIC_API_KEY=$KEY"       >> "$GITHUB_ENV" || true
        MOD="${{ inputs.anthropic-model }}";     [[ -n "$MOD" && -z "$ANTHROPIC_MODEL" ]]     && echo "ANTHROPIC_MODEL=$MOD"         >> "$GITHUB_ENV" || true
        EP="${{ inputs.azure-ai-endpoint }}";    [[ -n "$EP"  && -z "$AZURE_AI_ENDPOINT" ]]   && echo "AZURE_AI_ENDPOINT=$EP"        >> "$GITHUB_ENV" || true
        AK="${{ inputs.azure-ai-api-key }}";     [[ -n "$AK"  && -z "$AZURE_AI_API_KEY" ]]    && echo "AZURE_AI_API_KEY=$AK"         >> "$GITHUB_ENV" || true
        AM="${{ inputs.azure-ai-model }}";       [[ -n "$AM"  && -z "$AZURE_AI_MODEL" ]]      && echo "AZURE_AI_MODEL=$AM"           >> "$GITHUB_ENV" || true
        AV="${{ inputs.azure-ai-api-version }}"; [[ -n "$AV"  && -z "$AZURE_AI_API_VERSION" ]] && echo "AZURE_AI_API_VERSION=$AV"   >> "$GITHUB_ENV" || true

    - name: Run arbiter
      id: run
      shell: bash
      run: |
        set +e

        ARGS=("${{ inputs.target }}" "--out" "${{ inputs.out }}" "--concurrency" "${{ inputs.concurrency }}")

        if [[ "${{ inputs.mode }}" == "backlog" ]]; then
          ARGS+=("--backlog" "--github-repo" "${{ inputs.github-repo }}")
          [[ -n "${{ inputs.skip-alerts }}" ]]   && ARGS+=("--skip-alerts"   "${{ inputs.skip-alerts }}")
          [[ -n "${{ inputs.summary-issue }}" ]] && ARGS+=("--summary-issue" "${{ inputs.summary-issue }}")
          [[ "${{ inputs.dismiss-fps }}"    == "true" ]] && ARGS+=("--dismiss-fps")
          [[ "${{ inputs.post-comments }}"  == "true" ]] && ARGS+=("--post-comments")
        else
          [[ -n "${{ inputs.scanners }}"   ]] && ARGS+=("--scanners" "${{ inputs.scanners }}" "--github-repo" "${{ inputs.github-repo }}")
          [[ -n "${{ inputs.baseline }}"   ]] && ARGS+=("--baseline"    "${{ inputs.baseline }}")
          [[ -n "${{ inputs.github-ref }}" ]] && ARGS+=("--github-ref"  "${{ inputs.github-ref }}")
          [[ -n "${{ inputs.fail-on }}"    ]] && ARGS+=("--fail-on"     "${{ inputs.fail-on }}")
          [[ -n "${{ inputs.sarif-file }}" ]] && ARGS+=("--sarif"       "${{ inputs.sarif-file }}")
          [[ -n "${{ inputs.sarif-dir }}"  ]] && ARGS+=("--sarif-dir"   "${{ inputs.sarif-dir }}")
        fi

        [[ "${{ inputs.no-reachability }}" == "true" ]] && ARGS+=("--no-reachability")

        python "${{ github.action_path }}/triage-cli/triage.py" "${ARGS[@]}"
        EXIT_CODE=$?

        echo "exit_code=$EXIT_CODE"   >> "$GITHUB_OUTPUT"
        echo "report_md=${{ inputs.out }}.md"   >> "$GITHUB_OUTPUT"
        echo "report_json=${{ inputs.out }}.json" >> "$GITHUB_OUTPUT"

        exit $EXIT_CODE
