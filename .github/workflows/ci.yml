name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: triage-cli/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r triage-cli/requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check triage-cli/

      - name: Test
        run: pytest triage-cli/tests/ -v
